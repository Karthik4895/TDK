<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background (safe zone for maskable: keep content inside center 80%) -->
  <rect width="512" height="512" rx="80" fill="#3A1F10"/>
  <!-- Subtle background texture ring -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="#D4A84A" stroke-width="4" opacity="0.3"/>
  <circle cx="256" cy="256" r="210" fill="none" stroke="#D4A84A" stroke-width="1.5" opacity="0.2"/>
  <!-- Henna mandala -->
  <g transform="translate(256,256)">
    <!-- Outer 8 petals -->
    <ellipse rx="28" ry="72" fill="#D4A84A" opacity="0.9" transform="rotate(0)   translate(0,-110)"/>
    <ellipse rx="28" ry="72" fill="#D4A84A" opacity="0.9" transform="rotate(45)  translate(0,-110)"/>
    <ellipse rx="28" ry="72" fill="#D4A84A" opacity="0.9" transform="rotate(90)  translate(0,-110)"/>
    <ellipse rx="28" ry="72" fill="#D4A84A" opacity="0.9" transform="rotate(135) translate(0,-110)"/>
    <ellipse rx="28" ry="72" fill="#D4A84A" opacity="0.9" transform="rotate(180) translate(0,-110)"/>
    <ellipse rx="28" ry="72" fill="#D4A84A" opacity="0.9" transform="rotate(225) translate(0,-110)"/>
    <ellipse rx="28" ry="72" fill="#D4A84A" opacity="0.9" transform="rotate(270) translate(0,-110)"/>
    <ellipse rx="28" ry="72" fill="#D4A84A" opacity="0.9" transform="rotate(315) translate(0,-110)"/>
    <!-- Mid ring -->
    <circle r="70" fill="none" stroke="#BF8522" stroke-width="3" opacity="0.6"/>
    <!-- Inner 8 petals (smaller) -->
    <ellipse rx="16" ry="38" fill="#E8C070" opacity="0.7" transform="rotate(22.5)  translate(0,-52)"/>
    <ellipse rx="16" ry="38" fill="#E8C070" opacity="0.7" transform="rotate(67.5)  translate(0,-52)"/>
    <ellipse rx="16" ry="38" fill="#E8C070" opacity="0.7" transform="rotate(112.5) translate(0,-52)"/>
    <ellipse rx="16" ry="38" fill="#E8C070" opacity="0.7" transform="rotate(157.5) translate(0,-52)"/>
    <ellipse rx="16" ry="38" fill="#E8C070" opacity="0.7" transform="rotate(202.5) translate(0,-52)"/>
    <ellipse rx="16" ry="38" fill="#E8C070" opacity="0.7" transform="rotate(247.5) translate(0,-52)"/>
    <ellipse rx="16" ry="38" fill="#E8C070" opacity="0.7" transform="rotate(292.5) translate(0,-52)"/>
    <ellipse rx="16" ry="38" fill="#E8C070" opacity="0.7" transform="rotate(337.5) translate(0,-52)"/>
    <!-- Center disc -->
    <circle r="48" fill="#BF8522"/>
    <circle r="32" fill="#3A1F10"/>
    <circle r="10" fill="#D4A84A"/>
    <!-- Accent dots on outer ring -->
    <circle cx="0"   cy="-155" r="8" fill="#E8C070"/>
    <circle cx="110" cy="-110" r="8" fill="#E8C070"/>
    <circle cx="155" cy="0"    r="8" fill="#E8C070"/>
    <circle cx="110" cy="110"  r="8" fill="#E8C070"/>
    <circle cx="0"   cy="155"  r="8" fill="#E8C070"/>
    <circle cx="-110" cy="110" r="8" fill="#E8C070"/>
    <circle cx="-155" cy="0"   r="8" fill="#E8C070"/>
    <circle cx="-110" cy="-110" r="8" fill="#E8C070"/>
  </g>
  <!-- Brand text -->
  <text x="256" y="470" font-family="Georgia,serif" font-size="26" font-weight="bold"
        fill="#D4A84A" text-anchor="middle" letter-spacing="2">MEHANDI TALES</text>
</svg>
